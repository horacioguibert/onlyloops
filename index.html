<!-- ═══════════════════════════════════════════════
     NAMESPACE OL — arquitectura limpia
     ═══════════════════════════════════════════════ -->
<script>
const OL = {
  /* ── Estado global ── */
  state: {
    bpm: 112,
    key: 'C',
    bars: 4,
    timeSig: [4, 4],
    snap: 'quarter',
    notation: 'english',
    playing: false,
    live: false,
    loopSong: 'loop',
    zoom: 100,
    
    tracks: [
      // ejemplo inicial — sacar cuando haya agregar/quitar real
      { id: 1, inst: 'strato', muted: false, volume: 0.8, octave: 0 },
      { id: 2, inst: 'tele',   muted: false, volume: 0.8, octave: 0 },
      { id: 3, inst: 'bass',   muted: false, volume: 0.8, octave: 0 },
      { id: 4, inst: 'piano',  muted: false, volume: 0.8, octave: 0 },
      { id: 5, inst: 'drums',  muted: false, volume: 0.8, octave: 0 },
    ],

    /* Clips globales — un array plano con clip.track apuntando al track.id */
    clips: [
      { id: 101, track: 1, start: 0, dur: 4, chord: 'C',  ext: 'maj7', sounding: true  },
      { id: 102, track: 1, start: 4, dur: 2, chord: 'Am', ext: '',     sounding: false },
      { id: 103, track: 2, start: 0, dur: 8, chord: 'F',  ext: '',     sounding: false },
      { id: 104, track: 3, start: 2, dur: 3, chord: 'G',  ext: '7',    sounding: true  },
      { id: 105, track: 4, start: 0, dur: 2, chord: 'Dm', ext: '9',    sounding: false },
      { id: 106, track: 4, start: 5, dur: 2, chord: 'E',  ext: 'm',    sounding: false },
      { id: 107, track: 5, start: 0, dur: 16, chord: '',  ext: '',     sounding: false },
    ],
    
    debug: false,
  },
  
  /* ── UI (grilla, debug, toggles) ── */
  ui: {
    updateGridUnit() {
      const w = window.innerWidth;
      /* --u = ancho / 12, pero con tope máximo para que no se descontrole
         en desktop/preview. iPhone ≈ 32.5px, iPad ≈ 64px (máx útil) */
      const u = Math.min(w / 12, 36);
      document.documentElement.style.setProperty('--u', u + 'px');
      /* Limitar ancho visual del app en pantallas grandes — que siempre
         se vea como el móvil, sin estirar */
      const app = document.getElementById('app');
      if (app) {
        app.style.maxWidth = (u * 12) + 'px';
        app.style.margin = '0 auto';
      }
    },
    
    toggleDebug() {
      OL.state.debug = !OL.state.debug;
      document.body.classList.toggle('debug', OL.state.debug);
    },
    
    toggleLive() {
      OL.state.live = !OL.state.live;
      const btn = document.getElementById('live-btn');
      const wrap = document.getElementById('live-wrap');
      btn.classList.toggle('off', !OL.state.live);
      wrap.classList.toggle('visible', OL.state.live);
      /* Al abrir: centrar en el espacio libre debajo de los tracks */
      if (OL.state.live) {
        setTimeout(() => OL.ui.positionLive(), 20);
      }
    },
    
    /* Posicionar el live-wrap en el espacio libre (inicial)
       - Horizontalmente: alineado al canvas real (descuenta ancho de track-labels si visible)
       - Verticalmente: centrado en el espacio libre después del último track */
    positionLive() {
      const wrap = document.getElementById('live-wrap');
      const seq = document.getElementById('seq');
      const labels = document.getElementById('track-labels');
      if (!wrap || !seq) return;
      
      /* Horizontal: el wrap debe alinear con el canvas (seq-canvas), 
         descontando el ancho REAL del track-labels si está visible */
      const labelsVisible = labels && labels.style.display !== 'none';
      const labelsW = labelsVisible ? labels.offsetWidth : 0;
      /* +15px de corrección óptica (1.5 × ancho "M" de PROXIMO) */
      wrap.style.left = (labelsW + 15) + 'px';
      wrap.style.right = '0px';
      
      /* Vertical: centrado en el espacio libre */
      const trackH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--track-h')) || 65;
      const tracksH = OL.state.tracks.length * trackH;
      const seqH = seq.clientHeight;
      const wrapH = wrap.offsetHeight;
      const freeSpace = seqH - tracksH;
      const top = freeSpace > wrapH + 20
        ? tracksH + (freeSpace - wrapH) / 2
        : Math.max(0, (seqH - wrapH) / 2);
      wrap.style.top = top + 'px';
    },
    
    /* Drag vertical del live-wrap dentro del seq */
    initLiveDrag() {
      const wrap = document.getElementById('live-wrap');
      const seq = document.getElementById('seq');
      if (!wrap || !seq) return;
      
      let dragging = false, startY = 0, startTop = 0;
      const getY = (e) => e.touches ? e.touches[0].clientY : e.clientY;
      
      const onStart = (e) => {
        if (e.target.closest('.np-close')) return;
        dragging = true;
        wrap.classList.add('dragging');
        const rect = wrap.getBoundingClientRect();
        const seqRect = seq.getBoundingClientRect();
        startY = getY(e);
        startTop = rect.top - seqRect.top;
        wrap.style.top = startTop + 'px';
        e.preventDefault();
      };
      const onMove = (e) => {
        if (!dragging) return;
        const dy = getY(e) - startY;
        const newTop = startTop + dy;
        const wrapH = wrap.offsetHeight;
        const seqH = seq.clientHeight;
        const clamped = Math.max(0, Math.min(newTop, seqH - wrapH));
        wrap.style.top = clamped + 'px';
        e.preventDefault();
      };
      const onEnd = () => {
        if (!dragging) return;
        dragging = false;
        wrap.classList.remove('dragging');
      };
      
      wrap.addEventListener('mousedown', onStart);
      wrap.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('mousemove', onMove);
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('mouseup', onEnd);
      window.addEventListener('touchend', onEnd);
      window.addEventListener('touchcancel', onEnd);
    },
    
    toggleLoopSong() {
      const sw = document.getElementById('loop-song');
      const next = sw.dataset.pos === 'loop' ? 'song' : 'loop';
      sw.dataset.pos = next;
      OL.state.loopSong = next;
      sw.querySelectorAll('.seg').forEach((s, i) => {
        s.classList.toggle('active', (i === 0 && next === 'loop') || (i === 1 && next === 'song'));
      });
    },
    
    toggleTracksSidebar() {
      const lbls = document.getElementById('track-labels');
      const seq = document.getElementById('seq');
      const hidden = lbls.style.display !== 'none';
      lbls.style.display = hidden ? 'none' : '';
      seq.classList.toggle('sb-hidden', hidden);
      /* Reposicionar el live-wrap si está abierto */
      if (OL.state.live) {
        setTimeout(() => OL.ui.positionLive(), 10);
      }
    },
    
    zoom(dir) {
      OL.state.zoom = Math.max(50, Math.min(200, OL.state.zoom + dir * 10));
      // TODO: aplicar zoom al canvas
      console.log('[zoom]', OL.state.zoom);
    },
    
    goHome() {
      // Por ahora no hace nada, futuro: volver a pantalla inicial
    },
    
    /* ── Scrubber vertical: arrastrar arriba/abajo sobre valores numéricos ──
       Funciona en touch + mouse. Sensibilidad: 3px = 1 unidad.
       Soporta 'bpm' por ahora; extensible a otros params vía data-param */
    initScrubbers() {
      const scrubbables = document.querySelectorAll('.scrubbable');
      scrubbables.forEach(el => {
        let startY = 0;
        let startVal = 0;
        let dragging = false;
        let moved = false;
        
        const getVal = () => {
          const p = el.dataset.param;
          if (p === 'bpm') return OL.state.bpm;
          return parseInt(el.textContent, 10);
        };
        const setVal = (v) => {
          const p = el.dataset.param;
          if (p === 'bpm') {
            OL.state.bpm = Math.max(40, Math.min(240, v));
            el.textContent = OL.state.bpm;
          }
        };
        
        const onStart = (e) => {
          dragging = true;
          moved = false;
          startY = (e.touches ? e.touches[0].clientY : e.clientY);
          startVal = getVal();
          el.classList.add('scrubbing');
          e.preventDefault();
        };
        const onMove = (e) => {
          if (!dragging) return;
          const y = (e.touches ? e.touches[0].clientY : e.clientY);
          const dy = startY - y;           /* arriba = positivo */
          const delta = Math.round(dy / 3); /* 3px por unidad */
          if (delta !== 0) moved = true;
          setVal(startVal + delta);
          e.preventDefault();
        };
        const onEnd = (e) => {
          if (!dragging) return;
          dragging = false;
          el.classList.remove('scrubbing');
          /* Si no hubo arrastre real, es un tap → abrir sheet BPM */
          if (!moved) {
            OL.sheets.open(el.dataset.param);
          }
        };
        
        el.addEventListener('mousedown', onStart);
        el.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
        window.addEventListener('touchcancel', onEnd);
      });
    },
  },
  
  /* ── Transport (play/stop, BPM, etc.) ── */
  transport: {
    togglePlay() {
      OL.state.playing = !OL.state.playing;
      const btn = document.getElementById('play-btn');
      btn.classList.toggle('playing', OL.state.playing);
      /* La clase body.playing sincroniza el pulse de todos los botones mute */
      document.body.classList.toggle('playing', OL.state.playing);
      const svg = btn.querySelector('svg');
      if (OL.state.playing) {
        svg.innerHTML = '<rect x="7" y="5" width="3.5" height="14" rx="0.5"/><rect x="13.5" y="5" width="3.5" height="14" rx="0.5"/>';
      } else {
        svg.innerHTML = '<polygon points="7,5 7,19 19,12"/>';
      }
      // TODO: conectar con motor de audio (Tone.js Transport)
    },
    
    rewind() {
      // TODO: Tone.Transport.position = 0
      console.log('[rewind]');
    },
    
    bpmNudge(dir) {
      OL.state.bpm = Math.max(40, Math.min(240, OL.state.bpm + dir));
      document.getElementById('bpm-val').textContent = OL.state.bpm;
      // TODO: Tone.Transport.bpm.value = OL.state.bpm
    },
  },
  
  /* ── Tracks (render labels, mute, add/remove) ── */
  tracks: {
    renderAll() {
      const container = document.getElementById('track-labels');
      container.innerHTML = '';

      OL.state.tracks.forEach((t, i) => {
        // Track label (col izq)
        const label = document.createElement('div');
        label.className = 'track-label';
        label.dataset.trackId = t.id;
        label.innerHTML = `
          <button class="tl-mute${t.muted ? ' muted' : ''}" onclick="event.stopPropagation();OL.tracks.toggleMute(${t.id})" aria-label="Mute">
            <div class="tlm-pulse tlm-pulse-1"></div>
            <div class="tlm-pulse tlm-pulse-2"></div>
            <svg viewBox="0 0 24 24">
              <path class="tlm-spk" d="M3 9 L3 15 L7 15 L12 20 L12 4 L7 9 Z"/>
              <path class="tlm-wave" d="M15 10 Q16.5 12 15 14"/>
              <path class="tlm-wave" d="M17.5 8 Q20 12 17.5 16"/>
              <path class="tlm-wave" d="M20 6 Q23.5 12 20 18"/>
              <line class="tlm-x" x1="2" y1="22" x2="22" y2="2"/>
              <line class="tlm-x" x1="2" y1="2" x2="22" y2="22"/>
            </svg>
          </button>
          <div class="tl-img" data-inst="${t.inst}"></div>
        `;
        label.addEventListener('click', () => OL.sheets.open('track', { trackId: t.id }));
        container.appendChild(label);
      });

      // Mostrar/ocultar empty state
      document.getElementById('empty-state').style.display =
        OL.state.tracks.length === 0 ? 'flex' : 'none';
    },
    
    toggleMute(id) {
      const t = OL.state.tracks.find(x => x.id === id);
      if (!t) return;
      t.muted = !t.muted;
      const label = document.querySelector(`.track-label[data-track-id="${id}"]`);
      if (label) {
        label.querySelector('.tl-mute').classList.toggle('muted', t.muted);
      }
      // TODO: aplicar al motor de audio
    },
    
    add(inst) {
      const id = Math.max(0, ...OL.state.tracks.map(t => t.id)) + 1;
      OL.state.tracks.push({ id, inst, muted: false, volume: 0.8, octave: 0 });
      OL.tracks.renderAll();
      OL.clips.render();
    },

    remove(id) {
      OL.state.tracks = OL.state.tracks.filter(t => t.id !== id);
      OL.state.clips = OL.state.clips.filter(c => c.track !== id);
      OL.tracks.renderAll();
      OL.clips.render();
    },
  },

  /* ═══════════════════════════════════════════════
     CLIPS · Sequencer v11 — gestos, copy/paste, drag vertical
     ═══════════════════════════════════════════════ */
  clips: {
    /* ── Config local ── */
    cfg: {
      beatsPerBar: 4,
      snapDivision: 4,
      longPressMs: 500,
      doubleTapMs: 300,
      moveThreshold: 6,
      paletteAutocloseMs: 3500,
    },

    /* ── Estado ── */
    scrollPos: 0,
    globalClockStart: 0,
    selectedClipId: null,
    lastTapTime: 0,
    lastTapId: null,
    clipboard: null,           // { chord, ext, dur }
    paletteTimer: null,
    activeEmptyCell: null,     // { trackId, startBeat, durBeats, el }
    draggedClipId: null,
    draggedClipOriginalTrack: null,
    bgMode: 'idle',            // 'idle' | 'pending' | 'scroll' | 'longpress'
    bgStartX: 0, bgStartY: 0, bgStartScroll: 0,
    bgLPTimer: null,
    pasteDialogOpenedAt: 0,

    /* ── Helpers ── */
    getU() {
      return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--u'));
    },
    getBeatW() { return this.getU() * 1.25; },
    getSnapPx() { return this.getBeatW() / this.cfg.snapDivision; },
    getTotalBeats() { return OL.state.bars * this.cfg.beatsPerBar; },
    getContentWidth() { return this.getTotalBeats() * this.getBeatW(); },
    getMaxScroll() {
      const canvas = document.getElementById('seq-canvas');
      return Math.max(0, this.getContentWidth() - canvas.clientWidth);
    },

    applyScroll(px) {
      const maxS = this.getMaxScroll();
      this.scrollPos = Math.max(0, Math.min(px, maxS));
      const content = document.getElementById('seq-content');
      const beats = document.getElementById('band3-beats');
      if (content) content.style.transform = `translateX(${-this.scrollPos}px)`;
      if (beats)   beats.style.transform   = `translateX(${-this.scrollPos}px)`;
    },

    /* ── RENDER ── */
    render() {
      this.renderBarBeats();
      this.renderTrackRows();
      this.renderClips();
      requestAnimationFrame(() => this.renderGridLines());
    },

    renderBarBeats() {
      const el = document.getElementById('band3-beats');
      if (!el) return;
      el.innerHTML = '';
      const totalBeats = this.getTotalBeats();
      const bpb = this.cfg.beatsPerBar;
      for (let i = 0; i < totalBeats; i++) {
        const beat = document.createElement('div');
        beat.className = 'b3-beat';
        if (i % bpb === 0) {
          beat.classList.add('downbeat');
          beat.textContent = Math.floor(i / bpb) + 1;
        } else {
          beat.classList.add('off');
          beat.textContent = '·';
        }
        el.appendChild(beat);
      }
    },

    renderTrackRows() {
      const container = document.getElementById('seq-tracks-container');
      if (!container) return;
      container.innerHTML = '';
      const totalBeats = this.getTotalBeats();
      OL.state.tracks.forEach(t => {
        const row = document.createElement('div');
        row.className = 'seq-track-row';
        row.dataset.trackId = t.id;
        for (let i = 0; i < totalBeats; i++) {
          const cell = document.createElement('div');
          cell.className = 'beat-cell';
          row.appendChild(cell);
        }
        container.appendChild(row);
      });
    },

    renderClips() {
      const beatW = this.getBeatW();
      OL.state.clips.forEach(clip => {
        const row = document.querySelector(`.seq-track-row[data-track-id="${clip.track}"]`);
        if (!row) return;
        const el = this.createClipElement(clip, beatW);
        row.appendChild(el);
      });
    },

    createClipElement(clip, beatW) {
      const el = document.createElement('div');
      el.className = 'clip';
      if (clip.sounding) el.classList.add('sounding');
      if (clip.start === 0) el.classList.add('at-start');
      el.dataset.clipId = clip.id;
      el.style.left = (clip.start * beatW) + 'px';
      el.style.width = (clip.dur * beatW) + 'px';
      const chordHTML = clip.chord
        ? `${clip.chord}${clip.ext ? `<sup>${clip.ext}</sup>` : ''}`
        : '';
      el.innerHTML = `
        <div class="clip-lp-indicator"></div>
        <span class="label">${chordHTML}</span>
        <div class="clip-handle left"></div>
        <div class="clip-handle right"></div>
      `;
      if (clip.sounding) {
        const elapsedSec = (performance.now() - this.globalClockStart) / 1000;
        el.style.setProperty('--sounding-delay', `-${elapsedSec % 2}s`);
      }
      this.attachClipGestures(el, clip);
      return el;
    },

    renderGridLines() {
      const svg = document.getElementById('gridSvg');
      const svgTop = document.getElementById('gridSvgTop');
      if (!svg || !svgTop) return;
      const beatW = this.getBeatW();
      const totalBeats = this.getTotalBeats();
      const W = totalBeats * beatW;
      const container = document.getElementById('seq-tracks-container');
      const H = container ? container.getBoundingClientRect().height : 0;

      [svg, svgTop].forEach(s => {
        s.setAttribute('width', W);
        s.setAttribute('height', H);
        s.setAttribute('viewBox', `0 0 ${W} ${H}`);
        s.style.width = W + 'px';
        s.style.height = H + 'px';
        s.innerHTML = '';
      });

      for (let i = 0; i <= totalBeats; i++) {
        const x = i * beatW;
        const isBar = (i % this.cfg.beatsPerBar === 0);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x); line.setAttribute('x2', x);
        line.setAttribute('y1', 0); line.setAttribute('y2', H);
        line.setAttribute('stroke', `rgba(0,0,0,${isBar ? 0.35 : 0.18})`);
        line.setAttribute('stroke-width', 1);
        line.setAttribute('shape-rendering', 'crispEdges');
        svg.appendChild(line);

        if (isBar) {
          const topLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          topLine.setAttribute('x1', x); topLine.setAttribute('x2', x);
          topLine.setAttribute('y1', 0); topLine.setAttribute('y2', H);
          topLine.setAttribute('stroke', 'rgba(0,0,0,0.25)');
          topLine.setAttribute('stroke-width', 1);
          topLine.setAttribute('shape-rendering', 'crispEdges');
          svgTop.appendChild(topLine);
        }
      }
    },

    /* ── GESTOS SOBRE CLIPS ── */
    attachClipGestures(el, clip) {
      const self = this;
      let touchStartX = 0, touchStartY = 0;
      let longPressTimer = null;
      let dragging = false, lpActive = false, moved = false;
      let dragStartX = 0, originalStart = 0;

      function getPoint(e) {
        if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
        return { x: e.clientX, y: e.clientY };
      }

      function onStart(e) {
        e.stopPropagation();
        const p = getPoint(e);
        touchStartX = p.x; touchStartY = p.y;
        moved = false; lpActive = false; dragging = false;
        el.classList.add('lp-progress');
        longPressTimer = setTimeout(() => {
          if (moved) return;
          lpActive = true;
          el.classList.remove('lp-progress');
          el.classList.add('lifted');
          if (navigator.vibrate) navigator.vibrate(10);
          dragStartX = touchStartX;
          originalStart = clip.start;
          dragging = true;
        }, self.cfg.longPressMs);
        if (e.cancelable) e.preventDefault();
      }

      function onMove(e) {
        const p = getPoint(e);
        const dx = p.x - touchStartX;
        const dy = p.y - touchStartY;
        if (!moved && Math.hypot(dx, dy) > self.cfg.moveThreshold) {
          moved = true;
          if (!lpActive) {
            clearTimeout(longPressTimer);
            el.classList.remove('lp-progress');
            return;
          }
        }
        if (lpActive && dragging) {
          const beatW = self.getBeatW();
          const deltaPx = p.x - dragStartX;
          const deltaBeats = deltaPx / beatW;
          const newStart = Math.max(0, originalStart + deltaBeats);
          const snapped = Math.round(newStart * self.cfg.snapDivision) / self.cfg.snapDivision;
          const maxStart = self.getTotalBeats() - clip.dur;
          clip.start = Math.min(Math.max(0, snapped), maxStart);
          el.style.left = (clip.start * beatW) + 'px';
          el.classList.toggle('at-start', clip.start === 0);

          const mStart = document.getElementById('markerStart');
          const mEnd = document.getElementById('markerEnd');
          mStart.classList.add('visible');
          mEnd.classList.add('visible');
          mStart.style.left = (clip.start * beatW - self.scrollPos) + 'px';
          mEnd.style.left = (clip.start * beatW + clip.dur * beatW - self.scrollPos) + 'px';

          if (e.cancelable) e.preventDefault();
        } else if (lpActive) {
          if (e.cancelable) e.preventDefault();
        }
      }

      function onEnd(e) {
        clearTimeout(longPressTimer);
        el.classList.remove('lp-progress');
        document.getElementById('markerStart').classList.remove('visible');
        document.getElementById('markerEnd').classList.remove('visible');

        if (lpActive) {
          el.classList.remove('lifted');
          lpActive = false; dragging = false;
          return;
        }
        if (!moved) {
          const now = Date.now();
          if (self.lastTapId === clip.id && (now - self.lastTapTime) < self.cfg.doubleTapMs) {
            self.openChordSheet(clip);
            self.lastTapTime = 0; self.lastTapId = null;
          } else {
            self.selectClip(clip.id);
            self.lastTapTime = now; self.lastTapId = clip.id;
          }
        }
      }

      el.addEventListener('mousedown', onStart);
      el.addEventListener('touchstart', onStart, { passive: false });

      /* Resize handles */
      const handleLeft = el.querySelector('.clip-handle.left');
      const handleRight = el.querySelector('.clip-handle.right');

      function attachResize(handle, side) {
        let resizing = false, rStartX = 0, rOrigStart = 0, rOrigDur = 0;
        function rStart(e) {
          if (!el.classList.contains('selected')) return;
          resizing = true;
          rStartX = getPoint(e).x;
          rOrigStart = clip.start; rOrigDur = clip.dur;
          const mStart = document.getElementById('markerStart');
          const mEnd = document.getElementById('markerEnd');
          const beatW = self.getBeatW();
          mStart.classList.add('visible'); mEnd.classList.add('visible');
          mStart.style.left = (clip.start * beatW - self.scrollPos) + 'px';
          mEnd.style.left   = (clip.start * beatW + clip.dur * beatW - self.scrollPos) + 'px';
          e.stopPropagation();
          if (e.cancelable) e.preventDefault();
        }
        function rMove(e) {
          if (!resizing) return;
          const beatW = self.getBeatW();
          const dx = getPoint(e).x - rStartX;
          const deltaBeats = dx / beatW;
          const minDur = 1 / self.cfg.snapDivision;
          if (side === 'right') {
            let newDur = rOrigDur + deltaBeats;
            newDur = Math.round(newDur * self.cfg.snapDivision) / self.cfg.snapDivision;
            newDur = Math.max(minDur, newDur);
            const maxDur = self.getTotalBeats() - clip.start;
            newDur = Math.min(newDur, maxDur);
            clip.dur = newDur;
          } else {
            let newStart = rOrigStart + deltaBeats;
            newStart = Math.round(newStart * self.cfg.snapDivision) / self.cfg.snapDivision;
            newStart = Math.max(0, newStart);
            const end = rOrigStart + rOrigDur;
            newStart = Math.min(newStart, end - minDur);
            clip.start = newStart;
            clip.dur = end - newStart;
          }
          el.style.left = (clip.start * beatW) + 'px';
          el.style.width = (clip.dur * beatW) + 'px';
          el.classList.toggle('at-start', clip.start === 0);
          const mStart = document.getElementById('markerStart');
          const mEnd = document.getElementById('markerEnd');
          mStart.style.left = (clip.start * beatW - self.scrollPos) + 'px';
          mEnd.style.left   = (clip.start * beatW + clip.dur * beatW - self.scrollPos) + 'px';
          if (e.cancelable) e.preventDefault();
        }
        function rEnd() {
          if (!resizing) return;
          resizing = false;
          document.getElementById('markerStart').classList.remove('visible');
          document.getElementById('markerEnd').classList.remove('visible');
        }
        handle.addEventListener('mousedown', rStart);
        handle.addEventListener('touchstart', rStart, { passive: false });
        window.addEventListener('mousemove', rMove);
        window.addEventListener('touchmove', rMove, { passive: false });
        window.addEventListener('mouseup', rEnd);
        window.addEventListener('touchend', rEnd);
      }
      if (handleLeft) attachResize(handleLeft, 'left');
      if (handleRight) attachResize(handleRight, 'right');

      window.addEventListener('mousemove', (e) => {
        if (longPressTimer || lpActive) onMove(e);
      });
      window.addEventListener('touchmove', (e) => {
        if (longPressTimer || lpActive) onMove(e);
      }, { passive: false });
      window.addEventListener('mouseup', (e) => {
        if (longPressTimer || lpActive) onEnd(e);
      });
      window.addEventListener('touchend', (e) => {
        if (longPressTimer || lpActive) onEnd(e);
      });
    },

    /* ── SELECCIÓN + PALETA ── */
    selectClip(id) {
      this.deactivateEmptyCell();
      document.querySelectorAll('.clip.selected').forEach(c => c.classList.remove('selected'));
      const el = document.querySelector(`.clip[data-clip-id="${id}"]`);
      if (el) el.classList.add('selected');
      this.selectedClipId = id;
      this.showActionPalette(id);
    },

    deselectAll() {
      this.deactivateEmptyCell();
      document.querySelectorAll('.clip.selected').forEach(c => c.classList.remove('selected'));
      this.selectedClipId = null;
      this.hideActionPalette();
      this.hidePasteDialog();
    },

    showActionPalette(clipId) {
      const palette = document.getElementById('actionPalette');
      const pasteBtn = document.getElementById('paletteBtnPaste');
      const clipEl = document.querySelector(`.clip[data-clip-id="${clipId}"]`);
      if (!clipEl || !palette) return;
      /* Rehabilitar botones para clip seleccionado */
      palette.querySelector('[data-action="copy"]').disabled = false;
      palette.querySelector('[data-action="cut"]').disabled = false;
      palette.querySelector('[data-action="delete"]').disabled = false;
      pasteBtn.disabled = !this.clipboard;

      const clipRect = clipEl.getBoundingClientRect();
      palette.classList.add('visible');
      const self = this;
      requestAnimationFrame(() => {
        const pRect = palette.getBoundingClientRect();
        let x = clipRect.left + clipRect.width / 2 - pRect.width / 2;
        x = Math.max(8, Math.min(x, window.innerWidth - pRect.width - 8));
        let y = clipRect.top - pRect.height - 12;
        if (y < 8) y = clipRect.bottom + 12;
        palette.style.left = x + 'px';
        palette.style.top = y + 'px';
      });
      this.restartPaletteTimer();
    },

    hideActionPalette() {
      document.getElementById('actionPalette').classList.remove('visible');
      clearTimeout(this.paletteTimer);
    },

    restartPaletteTimer() {
      clearTimeout(this.paletteTimer);
      this.paletteTimer = setTimeout(() => this.hideActionPalette(), this.cfg.paletteAutocloseMs);
    },

    showFeedback(text) {
      const fb = document.getElementById('actionFeedback');
      fb.textContent = text;
      fb.classList.add('visible');
      setTimeout(() => fb.classList.remove('visible'), 1100);
    },

    updateClipboardIndicator() {
      const ind = document.getElementById('clipboardIndicator');
      const chordEl = document.getElementById('clipboardChord');
      if (this.clipboard) {
        chordEl.innerHTML = `${this.clipboard.chord}${this.clipboard.ext ? `<sup>${this.clipboard.ext}</sup>` : ''}`;
        ind.classList.add('visible');
      } else {
        ind.classList.remove('visible');
      }
    },

    /* ── ACCIONES PALETA ── */
    handlePaletteAction(action) {
      /* Si hay celda vacía activa y acción es paste */
      if (this.activeEmptyCell && action === 'paste') {
        if (!this.clipboard) return;
        const c = this.activeEmptyCell;
        const newClip = {
          id: Date.now(),
          track: c.trackId,
          start: c.startBeat,
          dur: Math.min(this.clipboard.dur, c.durBeats || 1),
          chord: this.clipboard.chord,
          ext: this.clipboard.ext,
          sounding: false,
        };
        OL.state.clips.push(newClip);
        this.deactivateEmptyCell();
        this.hideActionPalette();
        this.render();
        this.showFeedback('PEGADO');
        return;
      }

      const clip = OL.state.clips.find(c => c.id === this.selectedClipId);
      if (!clip) return;

      if (action === 'copy') {
        this.clipboard = { chord: clip.chord, ext: clip.ext, dur: clip.dur };
        this.showFeedback('COPIADO');
        this.updateClipboardIndicator();
        document.getElementById('paletteBtnPaste').disabled = false;
        this.restartPaletteTimer();
      } else if (action === 'cut') {
        this.clipboard = { chord: clip.chord, ext: clip.ext, dur: clip.dur };
        this.showFeedback('CORTADO');
        this.updateClipboardIndicator();
        this.deleteClip(clip);
      } else if (action === 'paste') {
        if (!this.clipboard) return;
        clip.chord = this.clipboard.chord;
        clip.ext = this.clipboard.ext;
        const labelEl = document.querySelector(`.clip[data-clip-id="${clip.id}"] .label`);
        if (labelEl) labelEl.innerHTML = `${clip.chord}${clip.ext ? `<sup>${clip.ext}</sup>` : ''}`;
        this.showFeedback('PEGADO');
        this.restartPaletteTimer();
      } else if (action === 'delete') {
        this.deleteClip(clip);
      }
    },

    deleteClip(clip) {
      const el = document.querySelector(`.clip[data-clip-id="${clip.id}"]`);
      if (el) {
        el.style.transition = 'opacity 0.2s, transform 0.2s';
        el.style.opacity = '0';
        el.style.transform = 'scale(0.9)';
        setTimeout(() => el.remove(), 200);
      }
      const idx = OL.state.clips.findIndex(c => c.id === clip.id);
      if (idx >= 0) OL.state.clips.splice(idx, 1);
      this.deselectAll();
    },

    /* ── CELDA VACÍA ACTIVA ── */
    activateEmptyCellAt(clientX, clientY) {
      const canvas = document.getElementById('seq-canvas');
      const canvasRect = canvas.getBoundingClientRect();
      const xRel = clientX - canvasRect.left + this.scrollPos;
      const yRel = clientY - canvasRect.top;
      const trackH = this.getU() * 2;
      const beatW = this.getBeatW();

      if (xRel < 0 || yRel < 0) return;
      const trackIdx = Math.floor(yRel / trackH);
      if (trackIdx < 0 || trackIdx >= OL.state.tracks.length) return;
      const track = OL.state.tracks[trackIdx];

      const clickBeat = xRel / beatW;
      const startBeat = Math.floor(clickBeat);
      const durBeats = 1;

      if (startBeat >= this.getTotalBeats()) return;

      /* Si hay un clip en ese beat, no activar */
      const occupied = OL.state.clips.some(c =>
        c.track === track.id &&
        startBeat >= c.start &&
        startBeat < c.start + c.dur
      );
      if (occupied) { this.deactivateEmptyCell(); return; }

      this.deactivateEmptyCell();

      const rows = document.querySelectorAll('.seq-track-row');
      const row = rows[trackIdx];
      if (!row) return;

      const slot = document.createElement('div');
      slot.className = 'empty-slot visible pulsing';
      slot.style.left = (startBeat * beatW) + 'px';
      slot.style.width = (durBeats * beatW) + 'px';

      if (this.clipboard) {
        const preview = document.createElement('div');
        preview.className = 'empty-slot-preview';
        preview.innerHTML = `${this.clipboard.chord}${this.clipboard.ext ? `<sup>${this.clipboard.ext}</sup>` : ''}`;
        slot.appendChild(preview);
      }
      row.appendChild(slot);
      this.activeEmptyCell = { trackId: track.id, startBeat, durBeats, el: slot };
      this.showEmptyCellPalette(slot);
    },

    deactivateEmptyCell() {
      if (this.activeEmptyCell && this.activeEmptyCell.el) {
        this.activeEmptyCell.el.remove();
      }
      this.activeEmptyCell = null;
      this.hideActionPalette();
    },

    showEmptyCellPalette(slotEl) {
      const palette = document.getElementById('actionPalette');
      const slotRect = slotEl.getBoundingClientRect();
      palette.classList.add('visible');
      palette.querySelector('[data-action="copy"]').disabled = true;
      palette.querySelector('[data-action="cut"]').disabled = true;
      palette.querySelector('[data-action="delete"]').disabled = true;
      document.getElementById('paletteBtnPaste').disabled = !this.clipboard;
      requestAnimationFrame(() => {
        const pRect = palette.getBoundingClientRect();
        let x = slotRect.left + slotRect.width / 2 - pRect.width / 2;
        x = Math.max(8, Math.min(x, window.innerWidth - pRect.width - 8));
        let y = slotRect.top - pRect.height - 12;
        if (y < 8) y = slotRect.bottom + 12;
        palette.style.left = x + 'px';
        palette.style.top = y + 'px';
      });
      this.restartPaletteTimer();
    },

    /* ── BACKGROUND DRAG (scroll del sequencer + long press → celda vacía) ── */
    bgStart(e) {
      if (e.target.closest('.clip')) return;
      if (e.target.closest('.action-palette')) return;
      if (e.target.closest('.paste-dialog')) return;
      if (e.target.closest('.empty-slot')) return;
      if (e.target.closest('.chord-sheet')) return;

      const p = this.getPoint(e);
      this.bgStartX = p.x; this.bgStartY = p.y;
      this.bgStartScroll = this.scrollPos;
      this.bgMode = 'pending';

      clearTimeout(this.bgLPTimer);
      const self = this;
      this.bgLPTimer = setTimeout(() => {
        if (self.bgMode !== 'pending') return;
        self.bgMode = 'longpress';
        self.activateEmptyCellAt(self.bgStartX, self.bgStartY);
        if (navigator.vibrate) navigator.vibrate(10);
      }, this.cfg.longPressMs);

      if (e.cancelable) e.preventDefault();
    },

    bgMove(e) {
      if (this.bgMode === 'idle' || this.bgMode === 'longpress') return;
      const p = this.getPoint(e);
      const dx = p.x - this.bgStartX;
      const dy = p.y - this.bgStartY;
      if (this.bgMode === 'pending' && Math.hypot(dx, dy) > this.cfg.moveThreshold) {
        clearTimeout(this.bgLPTimer);
        this.bgMode = 'scroll';
        document.body.classList.add('dragging');
      }
      if (this.bgMode === 'scroll') {
        this.applyScroll(this.bgStartScroll - dx);
        if (e.cancelable) e.preventDefault();
      }
    },

    bgEnd(e) {
      clearTimeout(this.bgLPTimer);
      const wasPending = this.bgMode === 'pending';
      if (this.bgMode === 'scroll') {
        const snap = this.getSnapPx();
        const snapped = Math.round(this.scrollPos / snap) * snap;
        this.applyScroll(snapped);
      } else if (wasPending) {
        if (this.selectedClipId !== null) {
          this.deselectAll();
        } else {
          this.activateEmptyCellAt(this.bgStartX, this.bgStartY);
        }
      }
      document.body.classList.remove('dragging');
      this.bgMode = 'idle';
    },

    /* ── DRAG VERTICAL ENTRE TRACKS + REPLACE DIALOG ── */
    handleVerticalDrag(e) {
      const liftedEl = document.querySelector('.clip.lifted');
      if (!liftedEl) {
        this.clearTrackHighlight();
        return;
      }
      const clipId = parseInt(liftedEl.dataset.clipId);
      const clip = OL.state.clips.find(c => c.id === clipId);
      if (!clip) return;

      if (this.draggedClipId !== clipId) {
        this.draggedClipId = clipId;
        this.draggedClipOriginalTrack = clip.track;
      }

      const p = this.getPoint(e);
      const canvas = document.getElementById('seq-canvas');
      const canvasRect = canvas.getBoundingClientRect();
      const yRel = p.y - canvasRect.top;
      const trackH = this.getU() * 2;
      const newTrackIdx = Math.floor(yRel / trackH);
      const clampedIdx = Math.max(0, Math.min(OL.state.tracks.length - 1, newTrackIdx));
      const targetTrack = OL.state.tracks[clampedIdx];
      if (!targetTrack) return;

      if (targetTrack.id !== clip.track) {
        this.highlightTrack(clampedIdx);
        clip.track = targetTrack.id;
        const newRow = document.querySelectorAll('.seq-track-row')[clampedIdx];
        if (newRow && liftedEl.parentElement !== newRow) {
          newRow.appendChild(liftedEl);
        }
      }
    },

    handleVerticalDrop(e) {
      setTimeout(() => this.clearTrackHighlight(), 100);
      if (this.draggedClipId === null) return;
      const clip = OL.state.clips.find(c => c.id === this.draggedClipId);
      const origTrack = this.draggedClipOriginalTrack;
      const draggedId = this.draggedClipId;
      this.draggedClipId = null;
      this.draggedClipOriginalTrack = null;
      if (!clip) return;
      if (clip.track === origTrack) return;

      const collisions = OL.state.clips.filter(c =>
        c.id !== draggedId &&
        c.track === clip.track &&
        !(c.start + c.dur <= clip.start || c.start >= clip.start + clip.dur)
      );

      if (collisions.length === 0) return;
      this.showReplaceDialog(clip, collisions, origTrack);
    },

    highlightTrack(idx) {
      this.clearTrackHighlight();
      const rows = document.querySelectorAll('.seq-track-row');
      if (rows[idx]) {
        rows[idx].style.background = 'color-mix(in srgb, var(--accent) 8%, transparent)';
      }
    },
    clearTrackHighlight() {
      document.querySelectorAll('.seq-track-row').forEach(r => { r.style.background = ''; });
    },

    showReplaceDialog(incomingClip, collisionClips, origTrack) {
      const dialog = document.getElementById('pasteDialog');
      const clipEl = document.querySelector(`.clip[data-clip-id="${incomingClip.id}"]`);
      if (!clipEl) return;
      const clipRect = clipEl.getBoundingClientRect();
      const victimsText = collisionClips.map(c => `${c.chord}${c.ext || ''}`).join(' · ');

      dialog.innerHTML = `
        <div style="padding: 10px 12px 8px; color: var(--paper); font-family: var(--sans); font-size: 12px; opacity: 0.7; letter-spacing: 0.05em;">
          REEMPLAZAR <span style="color: var(--live-red); font-weight: 600;">${victimsText}</span> con:
        </div>
        <button class="paste-opt" data-action="replace-ok">
          <span>Sí, reemplazar</span>
          <span class="chord-preview">${incomingClip.chord}${incomingClip.ext ? `<sup>${incomingClip.ext}</sup>` : ''}</span>
        </button>
        <button class="paste-opt" data-action="replace-cancel" style="color: color-mix(in srgb, var(--paper) 70%, transparent);">
          <span>Cancelar</span>
        </button>
      `;

      dialog.classList.add('visible');
      this.pasteDialogOpenedAt = Date.now();
      requestAnimationFrame(() => {
        const pRect = dialog.getBoundingClientRect();
        let x = clipRect.left + clipRect.width / 2 - pRect.width / 2;
        x = Math.max(8, Math.min(x, window.innerWidth - pRect.width - 8));
        let y = clipRect.top - pRect.height - 12;
        if (y < 8) y = clipRect.bottom + 12;
        dialog.style.left = x + 'px';
        dialog.style.top = y + 'px';
      });

      const self = this;
      dialog.querySelectorAll('.paste-opt').forEach(opt => {
        opt.addEventListener('click', (e) => {
          e.stopPropagation();
          if (opt.dataset.action === 'replace-ok') {
            collisionClips.forEach(c => {
              const idx = OL.state.clips.findIndex(x => x.id === c.id);
              if (idx >= 0) OL.state.clips.splice(idx, 1);
            });
            self.render();
            self.showFeedback('REEMPLAZADO');
          } else {
            incomingClip.track = origTrack;
            self.render();
          }
          self.hidePasteDialog();
        });
        opt.addEventListener('mousedown', e => e.stopPropagation());
        opt.addEventListener('touchstart', e => e.stopPropagation());
      });
    },

    hidePasteDialog() {
      document.getElementById('pasteDialog').classList.remove('visible');
    },

    /* ── CHORD EDITOR SHEET ── */
    openChordSheet(clip) {
      const big = document.getElementById('sheetChordBig');
      big.innerHTML = `${clip.chord}${clip.ext ? `<sup>${clip.ext}</sup>` : ''}`;
      document.getElementById('sheetBackdrop').classList.add('visible');
      document.getElementById('chordSheet').classList.add('visible');
    },

    closeChordSheet() {
      document.getElementById('sheetBackdrop').classList.remove('visible');
      document.getElementById('chordSheet').classList.remove('visible');
    },

    changeChord(newChord) {
      if (!this.selectedClipId) return;
      const clip = OL.state.clips.find(c => c.id === this.selectedClipId);
      if (!clip) return;
      const m = newChord.match(/^([A-G][♯♭#b]?)(.*)$/);
      if (m) { clip.chord = m[1]; clip.ext = m[2]; }
      else   { clip.chord = newChord; clip.ext = ''; }
      const el = document.querySelector(`.clip[data-clip-id="${clip.id}"] .label`);
      if (el) el.innerHTML = `${clip.chord}${clip.ext ? `<sup>${clip.ext}</sup>` : ''}`;
      document.getElementById('sheetChordBig').innerHTML =
        `${clip.chord}${clip.ext ? `<sup>${clip.ext}</sup>` : ''}`;
    },

    /* ── Util ── */
    getPoint(e) {
      if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
      return { x: e.clientX, y: e.clientY };
    },

    /* ── INIT ── */
    init() {
      this.globalClockStart = performance.now();
      const canvas = document.getElementById('seq-canvas');
      const self = this;

      /* Background drag listeners */
      canvas.addEventListener('mousedown', (e) => self.bgStart(e));
      canvas.addEventListener('touchstart', (e) => self.bgStart(e), { passive: false });
      window.addEventListener('mousemove', (e) => self.bgMove(e));
      window.addEventListener('touchmove', (e) => self.bgMove(e), { passive: false });
      window.addEventListener('mouseup', (e) => self.bgEnd(e));
      window.addEventListener('touchend', (e) => self.bgEnd(e));

      /* Drag vertical entre tracks */
      window.addEventListener('mousemove', (e) => self.handleVerticalDrag(e));
      window.addEventListener('touchmove', (e) => self.handleVerticalDrag(e), { passive: false });
      window.addEventListener('mouseup', (e) => self.handleVerticalDrop(e));
      window.addEventListener('touchend', (e) => self.handleVerticalDrop(e));

      /* Action palette buttons */
      const palette = document.getElementById('actionPalette');
      palette.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          self.handlePaletteAction(btn.dataset.action);
        });
        btn.addEventListener('mousedown', e => e.stopPropagation());
        btn.addEventListener('touchstart', e => e.stopPropagation());
      });
      palette.addEventListener('mouseenter', () => clearTimeout(self.paletteTimer));
      palette.addEventListener('mouseleave', () => self.restartPaletteTimer());

      /* Cerrar paste dialog al tocar afuera */
      document.addEventListener('mousedown', (e) => {
        const dialog = document.getElementById('pasteDialog');
        if (!dialog.classList.contains('visible')) return;
        if (dialog.contains(e.target)) return;
        if (Date.now() - self.pasteDialogOpenedAt < 150) return;
        self.hidePasteDialog();
      });
    },
  },
  
  /* ── Sheets (bottom panels: config, prog, track edit, wheels) ── */
  sheets: {
    open(type, data = {}) {
      // TODO: implementar cada sheet
      console.log('[sheet open]', type, data);
      // Ejemplo placeholder: abrir bottom sheet con contenido según type
    },
    
    close() {
      document.getElementById('bottom-sheet').classList.remove('open');
    },
  },
  
  /* ── Edit (undo, redo) ── */
  edit: {
    undoStack: [],
    undo() {
      console.log('[undo]');
      // TODO
    },
  },
  
  /* ── Init ── */
  init() {
    this.ui.updateGridUnit();
    window.addEventListener('resize', () => {
      this.ui.updateGridUnit();
      this.clips.render();
    });
    this.tracks.renderAll();
    this.clips.init();
    this.clips.render();
    this.ui.initScrubbers();
    this.ui.initLiveDrag();
    console.log('[OnlyLoops v11] ready · --u =', getComputedStyle(document.documentElement).getPropertyValue('--u'));
  },
};

document.addEventListener('DOMContentLoaded', () => OL.init());
</script>

<!-- ═══════════════════════════════════════════════
     SERVICE WORKER — FORCE UPDATE (v9.0)
     ═══════════════════════════════════════════════ -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    try {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) { await r.unregister(); }
      if (window.caches) {
        const keys = await caches.keys();
        for (const k of keys) { await caches.delete(k); }
      }
      const url = new URL(location.href);
      if (!url.searchParams.has("v9")) {
        url.searchParams.set("v9", "1");
        location.replace(url.toString());
        return;
      }
      await navigator.serviceWorker.register("/service-worker.js");
    } catch (err) {
      console.warn("SW upgrade:", err);
    }
  });
}
</script>
